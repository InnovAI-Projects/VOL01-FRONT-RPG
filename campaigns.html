<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/CamPresona.css" />
    <link rel="stylesheet" href="./css/menu.css" />
    <link rel="stylesheet" href="./css/table.css" />
    <link rel="stylesheet" href="./css/footer.css" />
    <title>Campanhas</title>
  </head>
  <body>
    <nav id="menu">
      <a href="./index.html">Início</a>
      <a href="./characters.html">Personagens</a>
      <a href="./campaigns.html">Campanhas</a>
      <a href="./login.html">Login</a>
      <a href="./convidado.html">Convidado</a>
      <a href="./register.html">Cadastro</a>
    </nav>
    <main>
      <table>
        <thead>
          <tr>
            <th>Nome da Campanha</th>
            <th>Descrição</th>
            <th>Sistema</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="campaignTable"></tbody>
      </table>

      <div class="container">
        <h2>Criar ou editar campanha</h2>
        <form id="form">
          <label for="name">Nome da Campanha:</label>
          <input type="text" id="name" name="name" />

          <label for="description">Descrição:</label>
          <textarea id="description" name="description"></textarea>

          <label for="system">Sistema:</label>
          <input type="text" id="system" name="system" />
          <div id="feedback"></div>
          <button type="submit">Salvar</button>
        </form>
      </div>
    </main>
    <footer>
      <p>Gerenciador de RPG.</p>
    </footer>
    <script src="./js/campanhas.js"></script>
  </body>
</html>
